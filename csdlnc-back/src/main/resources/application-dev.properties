
server.servlet.context-path=/
server.port = 8797

# CONFIG DATABASE
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/csdlnc?allowMultiQueries=true
spring.datasource.username=root
spring.datasource.password=021199
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------- LOGGING CONFIG --------------
logging.level.root=${LOGGIN_LEVEL:WARN}
# Logging for our app which located in package: ptit.core.*
logging.level.com.ptit=${LOGGIN_LEVEL:DEBUG}
# Logging pattern for the console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
# Logging pattern for file
logging.pattern.file="%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
# Logging for file name
logging.file.name=/u01/logs/back/${CONTEXT_NAME:ptit-back}.log

# Mybatis
mybatis.mapper-locations=classpath:/com/ptit/mybatis/mapper/**/*.xml
